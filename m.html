<!DOCTYPE html>
<html>
<head>
    <title>Motor Control</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI;
        }

        body{
            background:linear-gradient(135deg,#2193b0,#6dd5ed);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:500px;
            background:white;
            padding:40px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        h1{
            color:#1565C0;
            margin-bottom:20px;
        }

        .status{
            font-size:30px;
            font-weight:bold;
            color:green;
            margin:20px 0;
        }

        .btn{
            padding:15px 35px;
            margin:10px;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
            color:white;
        }

        .on{
            background:#4CAF50;
        }

        .off{
            background:#f44336;
        }

        a{
            text-decoration:none;
            color:white;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>🚰 Water Motor Control</h1>

    <h2>Motor Status</h2>

    <div class="status">
        ON
    </div>

    <button class="btn on">Motor ON</button>

    <button class="btn off">Motor OFF</button>

    <br><br>

    <a href="/dashboard">
        <button class="btn on">Back Dashboard</button>
    </a>

</div>

</body>
</html>
