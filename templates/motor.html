{% extends "baseofhtml.html" %}

{% block title %}
Motor Control
{% endblock %}

{% block content %}

<div class="container mt-4">

    <h1 class="mb-4 text-center">
        🚰 Water Motor Control
    </h1>

    <div class="card shadow">
        <div class="card-body text-center">

            <h3>⚙️ Motor Status</h3>

            <div class="alert alert-success mt-3">
                <h2>🟢 Motor ON</h2>
            </div>

            <button class="btn btn-success btn-lg m-2">
                ▶️ Motor ON
            </button>

            <button class="btn btn-danger btn-lg m-2">
                ⏹️ Motor OFF
            </button>

        </div>
    </div>

    <div class="card mt-4 shadow">
        <div class="card-body">

            <h3>📊 Motor Information</h3>

            <table class="table table-bordered table-hover">

                <tr class="table-primary">
                    <th>📋 Parameter</th>
                    <th>📊 Value</th>
                </tr>

                <tr>
                    <td>Motor Status</td>
                    <td>Running</td>
                </tr>

                <tr>
                    <td>Water Level</td>
                    <td>85%</td>
                </tr>

                <tr>
                    <td>Voltage</td>
                    <td>220V</td>
                </tr>

                <tr>
                    <td>Current</td>
                    <td>5A</td>
                </tr>

                <tr>
                    <td>Last Updated</td>
                    <td>Today</td>
                </tr>

            </table>

        </div>
    </div>

</div>

{% endblock %}
