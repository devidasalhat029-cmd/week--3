<!DOCTYPE html>
<html>
<head>
    <title>Analytics Dashboard</title>

    <style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI',sans-serif;
    }

    body{
        background:#f4f6f9;
    }

    .header{
        background:#1565C0;
        color:white;
        text-align:center;
        padding:25px;
    }

    .container{
        padding:30px;
    }

    .cards{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
        gap:20px;
    }

    .card{
        background:white;
        padding:25px;
        border-radius:15px;
        text-align:center;
        box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .card h2{
        color:#1565C0;
        margin-bottom:10px;
    }

    .value{
        font-size:35px;
        font-weight:bold;
    }

    .graph{
        margin-top:40px;
        background:white;
        padding:30px;
        border-radius:15px;
        box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .bar{
        height:30px;
        background:#4CAF50;
        margin:15px 0;
        border-radius:10px;
        color:white;
        text-align:center;
        line-height:30px;
    }

    a{
        text-decoration:none;
        background:#1565C0;
        color:white;
        padding:12px 25px;
        border-radius:10px;
    }

    .btn{
        text-align:center;
        margin-top:30px;
    }

    </style>
</head>

<body>

<div class="header">
    <h1>📊 Farm Analytics Dashboard</h1>
</div>

<div class="container">

    <div class="cards">

        <div class="card">
            <h2>🌱 Avg Soil Moisture</h2>
            <div class="value">65%</div>
        </div>

        <div class="card">
            <h2>🌡️ Avg Temperature</h2>
            <div class="value">28°C</div>
        </div>

        <div class="card">
            <h2>💧 Avg Humidity</h2>
            <div class="value">72%</div>
        </div>

        <div class="card">
            <h2>🚰 Water Usage</h2>
            <div class="value">120 L</div>
        </div>

    </div>

    <div class="graph">

        <h2>📈 Monthly Crop Performance</h2>

        <p>January</p>
        <div class="bar" style="width:60%;">60%</div>

        <p>February</p>
        <div class="bar" style="width:75%;">75%</div>

        <p>March</p>
        <div class="bar" style="width:85%;">85%</div>

        <p>April</p>
        <div class="bar" style="width:95%;">95%</div>

    </div>

    <div class="btn">
        <a href="/dashboard">⬅️ Back Dashboard</a>
    </div>

</div>

</body>
</html>
