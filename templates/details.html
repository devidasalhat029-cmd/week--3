<!DOCTYPE html>
<html>
<head>
    <title>Sensor Details</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }

        .container{
            width: 60%;
            margin: auto;
            margin-top: 50px;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        .card{
            background-color: #e8f5e9;
            padding: 15px;
            margin: 15px;
            border-radius: 10px;
        }

        a{
            text-decoration: none;
            color: white;
        }

        button{
            background-color: green;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🌾 Agriculture Monitoring System</h1>

    <div class="card">
        <h2>🌱 Soil Moisture Sensor</h2>
        <p>Current Value: 65%</p>
        <p>Status: Good Moisture Level</p>
    </div>

    <div class="card">
        <h2>🌡️ Temperature Sensor</h2>
        <p>Current Value: 28°C</p>
        <p>Status: Normal Temperature</p>
    </div>

    <div class="card">
        <h2>💧 Humidity Sensor</h2>
        <p>Current Value: 72%</p>
        <p>Status: Suitable for Crops</p>
    </div>

    <div class="card">
        <h2>🚰 Water Pump</h2>
        <p>Status: ON</p>
    </div>

    <br>

    <a href="/">
        <button>⬅️ Back to Dashboard</button>
    </a>

</div>

</body>
</html>
