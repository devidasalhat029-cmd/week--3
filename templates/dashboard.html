<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI',sans-serif;
    }

    body{
        background:#f4f6f9;
    }

    .navbar{
        background:#2E7D32;
        color:white;
        padding:20px;
        display:flex;
        justify-content:space-between;
        align-items:center;
    }

    .navbar h1{
        font-size:28px;
    }

    .container{
        padding:30px;
    }

    .cards{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
        gap:20px;
    }

    .card{
        background:white;
        padding:25px;
        border-radius:15px;
        text-align:center;
        box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .card h2{
        color:#2E7D32;
        margin-bottom:10px;
    }

    .value{
        font-size:35px;
        font-weight:bold;
    }

    .menu{
        margin-top:40px;
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
        gap:20px;
    }

    .btn{
        background:#2E7D32;
        color:white;
        padding:18px;
        text-align:center;
        border-radius:12px;
        text-decoration:none;
        font-size:18px;
        transition:0.3s;
    }

    .btn:hover{
        background:#1B5E20;
    }

    </style>
</head>

<body>

<div class="navbar">
    <h1>🌾 Agriculture Dashboard</h1>
    <h3>Welcome Farmer</h3>
</div>

<div class="container">

    <div class="cards">

        <div class="card">
            <h2>🌱 Soil Moisture</h2>
            <div class="value">65%</div>
        </div>

        <div class="card">
            <h2>🌡️ Temperature</h2>
            <div class="value">28°C</div>
        </div>

        <div class="card">
            <h2>💧 Humidity</h2>
            <div class="value">72%</div>
        </div>

        <div class="card">
            <h2>🚰 Motor Status</h2>
            <div class="value">ON</div>
        </div>

    </div>

    <div class="menu">

        <a href="/details" class="btn">
            📋 Sensor Details
        </a>

        <a href="/weather" class="btn">
            🌦️ Weather Forecast
        </a>

        <a href="/motor" class="btn">
            🚰 Motor Control
        </a>

         <a href="/analytics" class="btn">
            📊 Analytics
        </a>

        <a href="/login" class="btn">
            🔐 Logout
        </a>

    </div>

</div>

</body>
</html>
