{% extends "baseofhtml.html" %}

{% block title %}
Dashboard
{% endblock %}

{% block content %}

<style>

.hero{
background:linear-gradient(135deg,#16a34a,#22c55e);
color:white;
padding:40px;
border-radius:25px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.hero i{
font-size:90px;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:25px;
}

.card-box{
background:white;
padding:25px;
border-radius:20px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.1);
transition:.3s;
}

.card-box:hover{
transform:translateY(-8px);
}

.card-box i{
font-size:45px;
color:#16a34a;
margin-bottom:10px;
}

.quick-links{
margin-top:25px;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.btn-box{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-top:20px;
}

.btn-box a{
text-decoration:none;
text-align:center;
padding:15px;
border-radius:10px;
color:white;
font-weight:bold;
}

.farmer{background:#16a34a;}
.weather{background:#0ea5e9;}
.crop{background:#f59e0b;}
.motor{background:#dc2626;}

</style>

<div class="hero">

<div>
<h1>🌾 Agriculture Dashboard</h1>
<p>Smart Farm Monitoring System</p>
</div>

<i class="fas fa-tractor"></i>

</div>

<div class="cards">

<div class="card-box">
<i class="fas fa-temperature-high"></i>
<h2>29°C</h2>
<p>Temperature</p>
</div>

<div class="card-box">
<i class="fas fa-droplet"></i>
<h2>68%</h2>
<p>Soil Moisture</p>
</div>

<div class="card-box">
<i class="fas fa-cloud-rain"></i>
<h2>72%</h2>
<p>Humidity</p>
</div>

<div class="card-box">
<i class="fas fa-faucet-drip"></i>
<h2>ON</h2>
<p>Motor Status</p>
</div>

</div>

<div class="quick-links">

<h2>Quick Access</h2>

<div class="btn-box">

<a href="/farmer" class="farmer">
👨‍🌾 Farmer
</a>

<a href="/weather" class="weather">
🌦️ Weather
</a>

<a href="/crop" class="crop">
🌱 Crop
</a>

<a href="/motor" class="motor">
🚰 Motor
</a>

</div>

</div>

{% endblock %}
