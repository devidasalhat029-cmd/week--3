
<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}AgriMonitor{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body{
            font-family: 'Roboto', sans-serif;
            background-color: #f4f8f4;
        }

        .navbar-brand{
            font-weight: bold;
            font-size: 24px;
        }

        footer{
            background: #212529;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 50px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">

        <a class="navbar-brand" href="{{ url_for('home') }}">
            🌾 AgriMonitor
        </a>

        <div class="ms-auto">
            <a class="text-white text-decoration-none me-3"
               href="{{ url_for('home') }}">
               🏠 Home
            </a>

            <a class="text-white text-decoration-none me-3"
               href="{{ url_for('records') }}">
               ✅ Record
            </a>

            <a class="text-white text-decoration-none me-3"
               href="{{ url_for('farmer_information') }}">
               👨‍🌾 Farmer
            </a>
            <a class="text-white text-decoration-none me-3"
               href="{{ url_for('login') }}">
              👤Login
            </a>
            <a class="text-white text-decoration-none me-3"
               href="{{ url_for('motor') }}">
                 🚰 Motor
            </a>
            <a class="text-white text-decoration-none me-3"
               href="{{ url_for('weather') }}">
               🌧️ Weather 
            </a>
            <a class="text-white text-decoration-none me-3"
               href="{{ url_for('crop') }}">
               🌱Crop
            </a>
            <a class="text-white text-decoration-noneme-3"
               href="{{ url_for('analytics') }}">
               📈Analytics
            </a>   
        </div>

    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<footer>
    © 2026 Automated Agriculture Monitoring System |
    Smart Farming with Flask 🌱
</footer>

</body>
</html>
