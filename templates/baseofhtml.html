<!DOCTYPE html>
<html>
<head>

<title>{% block title %}{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f7fa;
}

.navbar{
background:#198754;
padding:15px 30px;
}

.logo{
color:white;
font-size:24px;
font-weight:bold;
text-decoration:none;
}

.nav-links{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.nav-links a{
color:white;
text-decoration:none;
padding:8px 15px;
border-radius:8px;
transition:.3s;
}

.nav-links a:hover{
background:white;
color:#198754;
}

.main-content{
padding:25px;
}

.footer{
background:#198754;
color:white;
text-align:center;
padding:15px;
margin-top:30px;
}

</style>

</head>

<body>

<nav class="navbar d-flex justify-content-between">

<a href="/" class="logo">
🌾 Agro Monitor
</a>

<div class="nav-links">

<a href="/">
<i class="fas fa-house"></i> Home
</a>

<a href="/dashboard">
<i class="fas fa-chart-line"></i> Dashboard
</a>

<a href="/farmer">
<i class="fas fa-user"></i> Farmer
</a>

<a href="/weather">
<i class="fas fa-cloud-sun"></i> Weather
</a>

<a href="/crop">
<i class="fas fa-seedling"></i> Crop
</a>

<a href="/motor">
<i class="fas fa-faucet"></i> Motor
</a>

<a href="/records">
<i class="fas fa-database"></i> Records
</a>

<a href="/analytics">
<i class="fas fa-chart-pie"></i> Analytics
</a>

<a href="/logout">
<i class="fas fa-right-from-bracket"></i> Logout
</a>

</div>

</nav>

<div class="main-content">

{% block content %}
{% endblock %}

</div>

<div class="footer">
Automatic Agriculture Monitoring System © 2026
</div>

</body>
</html>dd
