{% extends "baseofhtml.html" %}

{% block title %}
Farmer Login
{% endblock %}

{% block content %}

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-5">

            <div class="card shadow-lg border-0">

                <div class="card-body p-5">

                    <div class="text-center mb-4">

                        <h1 class="display-4">🌾</h1>

                        <h2 class="text-success">
                            Farmer Login
                        </h2>

                        <p class="text-muted">
                            Automatic Agriculture Monitoring System
                        </p>

                    </div>

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                👤 Username
                            </label>

                            <input
                                type="text"
                                name="username"
                                class="form-control"
                                placeholder="Enter Username"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                🔒 Password
                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                placeholder="Enter Password"
                                required>

                        </div>

                        <div class="d-grid">

                            <button
                                type="submit"
                                class="btn btn-success btn-lg">

                                🚀 Login

                            </button>

                        </div>

                    </form>

                    <hr>

                    <div class="text-center">

                        <small class="text-muted">
                            🌾 Smart Farming Dashboard © 2026
                        </small>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
