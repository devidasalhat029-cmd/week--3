<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmer Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#11998e,#38ef7d);
}

.login-box{
    width:400px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
}

.logo{
    font-size:60px;
    margin-bottom:10px;
}

h1{
    color:#2E7D32;
    margin-bottom:10px;
}

.subtitle{
    color:gray;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
}

input:focus{
    outline:none;
    border-color:#2E7D32;
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#2E7D32;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1B5E20;
}

.footer{
    margin-top:20px;
    color:gray;
    font-size:14px;
}

</style>
</head>

<body>

<div class="login-box">

    <div class="logo">🌾</div>

    <h1>Farmer Login</h1>

    <p class="subtitle">
        Automatic Agriculture Monitoring System
    </p>

    <form>
        <input type="text" placeholder="Enter Username" required>

        <input type="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="footer">
        Smart Farming Dashboard © 2026
    </div>

</div>

</body>
</html>
