{% extends "base.html" %}

{% block content %}

<h2>Records</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Field</th>
        <th>Crop</th>
    </tr>

    {% for record in records %}
    <tr>
        <td>{{ record.id }}</td>
        <td>{{ record.field }}</td>
        <td>{{ record.crop }}</td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
